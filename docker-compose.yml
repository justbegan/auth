services:
  web:
    build:
      context: ./app
    volumes:
      - ./app:/app
      - static_volume:/app/static
      - media_volume:/app/media
    expose:
      - "8000"
    depends_on:
      - db
    env_file:
      - app/.env

  nginx:
    image: nginx:1.28-alpine
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - static_volume:/app/static
      - media_volume:/app/media
    ports:
      - "${NGINX_PORT}:80"
    depends_on:
      - web


  db:
    image: postgres:16-alpine
    env_file:
      - app/.env
    volumes:
      - db_data:/var/lib/postgresql/data
    expose:
      - "5432"

volumes:
  static_volume:
  media_volume:
  db_data: